name: Render Quarto Book

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: quarto-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # Python para chunks {python} con knitr/reticulate
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Dependencias de R con cache (incluye reticulate)
      - name: Install R deps (cached)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::reticulate
            any::knitr
            any::rmarkdown
            any::tidyverse
          # Opcional: define repos si CRAN va lento
          # extra-packages: any::jsonlite, any::readr

      # (Opcional) Instala paquetes de Python que uses en los chunks
      - name: Install Python deps (optional)
        run: |
          python -m pip install --upgrade pip
          # Añade aquí lo que uses en tus chunks Python:
          pip install numpy pandas matplotlib scipy seaborn

      - name: Render book
        env:
          # Hace que reticulate use el Python configurado por setup-python
          RETICULATE_PYTHON: ${{ env.pythonLocation }}/bin/python
        run: |
          quarto render .

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _book/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4